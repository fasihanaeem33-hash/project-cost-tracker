{% extends "base.html" %}

{% block content %}

<h2>Employees</h2>

<form method="POST" action="/add_employee">

<input name="name" placeholder="Name" required>
<input name="role" placeholder="Role">
<input name="rate" placeholder="Hourly Rate">

<button class="btn btn-primary">Add</button>

</form>

<table class="table mt-3">

<tr>
<th>Name</th>
<th>Role</th>
<th>Rate</th>
</tr>

{% for e in employees %}

<tr>
<td>{{e.name}}</td>
<td>{{e.role}}</td>
<td>${{e.rate}}</td>
</tr>

{% endfor %}

</table>

{% endblock %}
